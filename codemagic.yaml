workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.4
      xcode: 26.0.1
      ios_signing:
        distribution_type: app_store
        bundle_identifier: pt.studio59.app
      vars:
        FLUTTER_BUILD_NUMBER: "3"
    scripts:
      - name: Flutter Pub Get
        script: flutter pub get
      - name: Build IPA
        script: flutter build ipa --release --build-number=$FLUTTER_BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
